<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Camera Test</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }

    video {
      width: 80%;
      max-width: 800px;
      border-radius: 12px;
      background: #111;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <h2>📷 摄像头测试</h2>

  <video id="video" autoplay playsinline></video>

  <div class="controls">
    <button onclick="startCamera()">启动摄像头</button>
    <button id="captureBtn" onclick="takePhoto()" disabled>拍照保存</button>
  </div>

  <canvas id="canvas" hidden></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
        captureBtn.disabled = false;

      } catch (err) {
        alert("摄像头启动失败：" + err);
        console.error(err);
      }
    }

    function takePhoto() {
      if (!video.srcObject) {
        alert("请先启动摄像头");
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');

        link.href = url;
        link.download = `photo-${timestamp}.jpg`;
        link.click();

        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.92);
    }
  </script>

</body>
</html>
