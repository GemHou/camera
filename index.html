<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera + Depth Anything V2</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #eee;
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    h2 { margin: 8px 0; }

    #status {
      min-height: 1.4em;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 12px;
      text-align: center;
    }

    #status.busy { color: #ffb347; }
    #status.ready { color: #7dffb3; }
    #status.error { color: #ff6b6b; }

    .preview-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
    }

    .panel {
      flex: 1 1 320px;
      max-width: 580px;
    }

    .panel label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    video, canvas {
      width: 100%;
      border-radius: 12px;
      background: #111;
      display: block;
    }

    canvas.processing {
      opacity: 0.55;
      filter: grayscale(0.2);
    }

    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 10px 18px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2a2a2a;
      color: #fff;
    }

    button:hover:not(:disabled) { background: #3a3a3a; }

    button.primary { background: #2563eb; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }

    button.active { background: #059669; }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
      text-align: center;
      max-width: 640px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <h2>📷 摄像头 + DA2 深度</h2>
  <div id="status">正在初始化…</div>

  <div class="preview-row">
    <div class="panel">
      <label>摄像头</label>
      <video id="video" autoplay playsinline muted></video>
    </div>
    <div class="panel">
      <label>深度图（Depth Anything V2 Small）</label>
      <canvas id="depthCanvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <button onclick="startCamera()">启动摄像头</button>
    <button id="captureBtn" onclick="takePhoto()" disabled>拍照保存</button>
    <button id="depthBtn" class="primary" onclick="estimateDepthOnce()" disabled>深度估算</button>
    <button id="autoBtn" onclick="toggleAutoDepth()" disabled>自动刷新：关</button>
  </div>

  <p class="hint">
    推理在浏览器本地运行（WASM），桌面约 1 秒/帧，手机会更慢。
    自动模式按「上一帧完成 + 1.2 秒」节流，避免排队卡顿。
    请用 <code>python serve.py</code> 启动，手机访问终端里显示的局域网 IP（如 http://192.168.x.x:8080/）。
    首次下载约 95MB，手机需 1–3 分钟；下载完成后会缓存，下次更快。
  </p>

  <canvas id="canvas" hidden></canvas>

  <script src="vendor/onnxruntime-web/ort.wasm.min.js?v=3"></script>
  <script src="depth.js?v=3"></script>
  <script>
    const MODEL_URL = 'models/depth_anything_v2_small.onnx';
    const WASM_BASE = new URL('vendor/onnxruntime-web/', window.location.href).href;
    const AUTO_INTERVAL_MS = 1200;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const depthCanvas = document.getElementById('depthCanvas');
    const depthCtx = depthCanvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const captureBtn = document.getElementById('captureBtn');
    const depthBtn = document.getElementById('depthBtn');
    const autoBtn = document.getElementById('autoBtn');

    let modelReady = false;
    let inferring = false;
    let autoDepth = false;
    let autoTimer = null;

    function setStatus(text, kind = '') {
      statusEl.textContent = text;
      statusEl.className = kind;
    }

    function updateDepthControls() {
      const camOn = !!video.srcObject;
      depthBtn.disabled = !(modelReady && camOn && !inferring);
      autoBtn.disabled = !(modelReady && camOn);
    }

    async function initDepth() {
      if (location.protocol === 'file:') {
        setStatus('请用 http://127.0.0.1:8080 打开页面，file:// 无法加载模型', 'error');
        return;
      }

      if (typeof ort === 'undefined') {
        setStatus('ONNX Runtime 脚本加载失败，请确认已运行 python serve.py', 'error');
        return;
      }

      setStatus('准备加载 Depth Anything V2…');

      try {
        await DepthEngine.initDepthModel({
          modelUrl: MODEL_URL,
          wasmBase: WASM_BASE,
          onStatus: (text) => setStatus(text),
        });
        modelReady = true;
        setStatus('模型就绪，请启动摄像头', 'ready');
        updateDepthControls();
      } catch (err) {
        console.error(err);
        setStatus('加载失败：' + (err.message || err), 'error');
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        depthCanvas.width = video.videoWidth || 640;
        depthCanvas.height = video.videoHeight || 480;
        depthCtx.fillStyle = '#111';
        depthCtx.fillRect(0, 0, depthCanvas.width, depthCanvas.height);

        captureBtn.disabled = false;
        updateDepthControls();
        if (modelReady) {
          setStatus('就绪 — 点击「深度估算」或开启自动刷新', 'ready');
        }
      } catch (err) {
        alert('摄像头启动失败：' + err);
        console.error(err);
      }
    }

    function takePhoto() {
      if (!video.srcObject) {
        alert('请先启动摄像头');
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        link.href = url;
        link.download = `photo-${timestamp}.jpg`;
        link.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.92);
    }

    async function runDepthInference() {
      if (!modelReady || !video.srcObject || inferring) return;

      inferring = true;
      depthCanvas.classList.add('processing');
      setStatus('推理中…', 'busy');
      updateDepthControls();

      try {
        const { imageData, elapsedMs, width, height } = await DepthEngine.inferDepthFromVideo(video);
        depthCanvas.width = width;
        depthCanvas.height = height;
        depthCtx.putImageData(imageData, 0, 0);

        const fps = (1000 / elapsedMs).toFixed(1);
        setStatus(`上次推理 ${elapsedMs.toFixed(0)} ms（约 ${fps} FPS）`, 'ready');
      } catch (err) {
        setStatus('推理失败：' + (err.message || err), 'error');
        console.error(err);
      } finally {
        inferring = false;
        depthCanvas.classList.remove('processing');
        updateDepthControls();
        scheduleAutoDepth();
      }
    }

    function estimateDepthOnce() {
      stopAutoDepth(false);
      runDepthInference();
    }

    function toggleAutoDepth() {
      autoDepth = !autoDepth;
      autoBtn.textContent = autoDepth ? '自动刷新：开' : '自动刷新：关';
      autoBtn.classList.toggle('active', autoDepth);
      if (autoDepth) {
        scheduleAutoDepth(true);
      } else {
        stopAutoDepth(false);
      }
    }

    function stopAutoDepth(resetLabel) {
      if (autoTimer) {
        clearTimeout(autoTimer);
        autoTimer = null;
      }
      if (resetLabel) {
        autoDepth = false;
        autoBtn.textContent = '自动刷新：关';
        autoBtn.classList.remove('active');
      }
    }

    function scheduleAutoDepth(immediate = false) {
      if (!autoDepth) return;
      if (autoTimer) clearTimeout(autoTimer);

      const delay = immediate ? 0 : AUTO_INTERVAL_MS;
      autoTimer = setTimeout(() => {
        autoTimer = null;
        if (autoDepth && !inferring) {
          runDepthInference();
        }
      }, delay);
    }

    video.addEventListener('loadedmetadata', () => {
      if (video.videoWidth && video.videoHeight) {
        depthCanvas.width = video.videoWidth;
        depthCanvas.height = video.videoHeight;
      }
    });

    initDepth();
  </script>

</body>
</html>
